        - /usr/bin/env sh .sqa/script.isabelline_ambitious_bullfrog.sh
        container: qc.sty_champagne_logical_gull
      github.com/openaire/iis flake8:
        commands:
        - /usr/bin/env sh .sqa/script.mauve_anxious_okapi.sh
        container: qc.sty_currant_peppy_spren
      github.com/openaire/iis jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.pink_artistic_chinchilla.sh
        container: qc.sty_daffodil_vibrant_mandrill
  QC.Uni:
    repos:
      github.com/openaire/iis pytest:
        commands:
        - /usr/bin/env sh .sqa/script.nutmeg_positive_hydra.sh
        container: qc.uni_kiwi_anxious_seal
