config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/openaire/iis:
      branch: master
      repo: https://github.com/openaire/iis.git
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/openaire/iis git:
        commands:
        - /usr/bin/env sh .sqa/script.dusk_lively_antelope.sh
        container: qc.acc_maroon_timid_dhole
  QC.Doc:
    repos:
      github.com/openaire/iis find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.zinnia_thankful_flounder.sh
        container: qc.doc_alabaster_understanding_kangaroo
      github.com/openaire/iis git:
        commands:
        - /usr/bin/env sh .sqa/script.watermelon_observant_python.sh
        container: qc.doc_cinnamon_romantic_hydra
      github.com/openaire/iis markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.malachite_mindful_hornbill.sh
        container: qc.doc_hunter_skeptical_badger
  QC.Lic:
    repos:
      github.com/openaire/iis licensee:
        commands:
        - /usr/bin/env sh .sqa/script.coffee_inventive_walrus.sh
        container: qc.lic_champagne_unique_caribou
  QC.Sec:
    repos:
      github.com/openaire/iis bandit:
        commands:
        - /usr/bin/env sh .sqa/script.cinnabar_serene_frog.sh
        container: qc.sec_marigold_compassionate_shark
  QC.Sty:
